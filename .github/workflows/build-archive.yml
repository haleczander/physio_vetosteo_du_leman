name: Build Site Archive

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-astro:
    runs-on: ubuntu-latest
    env:
      ASTRO_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Copy .htaccess into dist
        run: |
          mkdir -p dist
          cp public/.htaccess dist/.htaccess

      - name: Upload dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: astro-dist
          path: dist/
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build-astro

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: astro-dist
          path: dist/

      - name: Deploy dist to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ vars.HOSTINGER_FTP_HOST }}
          port: ${{ vars.HOSTINGER_FTP_PORT }}
          username: ${{ vars.HOSTINGER_FTP_USER }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          local-dir: dist/
          server-dir: /domains/physiovetoduleman.com/public_html/

  package:
    runs-on: ubuntu-latest
    needs: build-astro
    env:
      RELEASE_TAG: site-archive-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download dist artifact
        uses: actions/download-artifact@v8
        with:
          name: astro-dist
          path: dist/

      - name: Compute archive name
        id: archive
        run: |
          safe_ref=$(echo "${GITHUB_REF_NAME}" | tr '/' '-')
          echo "safe_ref=$safe_ref" >> "$GITHUB_OUTPUT"
          echo "zip_name=physiovetoduleman-${safe_ref}-${GITHUB_SHA}.zip" >> "$GITHUB_OUTPUT"

      - name: Create archive
        run: |
          mkdir -p out
          zip -r "out/${{ steps.archive.outputs.zip_name }}" dist

      - name: Move release tag to current commit
        run: |
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG" --force

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
          gh release create "$RELEASE_TAG" \
            --title "Latest Site Archive" \
            --notes "Archive ZIP generated automatically by GitHub Actions." \
            --prerelease

      - name: Upload archive to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" out/*.zip --clobber
